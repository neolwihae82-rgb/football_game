<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>고양이 vs 원숭이 축구 (모바일용)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #2c3e50;
            color: white;
            font-family: 'Malgun Gothic', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none; /* 모바일에서 화면 스크롤 방지 */
        }

        #ui-container {
            text-align: center;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #selection-screen {
            background-color: #34495e;
            padding: 20px;
            border-radius: 10px;
            width: 90%;
            max-width: 400px;
        }

        .character-options {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .character-card {
            cursor: pointer;
            background-color: #ecf0f1;
            color: #333;
            padding: 10px;
            border-radius: 10px;
            transition: transform 0.2s;
        }

        .character-card:active {
            transform: scale(0.95);
        }

        .character-card img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 5px;
        }

        #game-screen {
            position: relative;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #scoreboard {
            display: flex;
            justify-content: space-around;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 5px;
            width: 100%;
            max-width: 800px;
        }

        #gameCanvas {
            background-color: #4CAF50;
            border: 3px solid #fff;
            border-radius: 10px;
            width: 95%;
            max-width: 800px;
            aspect-ratio: 4/3; /* 비율 유지 */
        }

        #game-over-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        #game-over-screen button {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 15px;
        }

        /* 모바일 컨트롤 UI */
        #mobile-controls {
            display: none; /* 게임 시작 시 보이도록 설정 */
            width: 95%;
            max-width: 800px;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding: 0 10px;
            box-sizing: border-box;
        }

        .d-pad {
            display: grid;
            grid-template-columns: 60px 60px 60px;
            grid-template-rows: 60px 60px 60px;
            gap: 5px;
        }

        .d-pad button {
            background-color: rgba(255, 255, 255, 0.2);
            border: 2px solid white;
            border-radius: 10px;
            color: white;
            font-size: 24px;
            touch-action: none;
            user-select: none;
            outline: none;
        }

        .d-pad button:active { 
            background-color: rgba(255, 255, 255, 0.6); 
        }

        #up-btn { grid-column: 2; grid-row: 1; }
        #left-btn { grid-column: 1; grid-row: 2; }
        #right-btn { grid-column: 3; grid-row: 2; }
        #down-btn { grid-column: 2; grid-row: 3; }

        .action-btn button {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background-color: rgba(231, 76, 60, 0.7);
            border: 3px solid #c0392b;
            color: white;
            font-size: 18px;
            font-weight: bold;
            touch-action: none;
            user-select: none;
            outline: none;
        }

        .action-btn button:active { 
            background-color: rgba(231, 76, 60, 1); 
        }
    </style>
</head>
<body>
    <div id="ui-container">
        <h1 style="margin: 10px 0;">고양이 vs 원숭이 축구</h1>
        <div id="selection-screen">
            <h2>캐릭터를 선택하세요</h2>
            <div class="character-options">
                <div class="character-card" onclick="selectCharacter('cat')">
                    <img src="sample picture/cat.jpg" alt="고양이">
                    <p>고양이</p>
                </div>
                <div class="character-card" onclick="selectCharacter('monkey')">
                    <img src="sample picture/monkey.jpg" alt="원숭이">
                    <p>원숭이</p>
                </div>
            </div>
        </div>

        <div id="game-screen" style="display: none;">
            <div id="scoreboard">
                <span id="score-cat">고양이: 0</span>
                <span id="score-monkey">원숭이: 0</span>
            </div>
            <canvas id="gameCanvas" width="800" height="600"></canvas>
            <div id="game-over-screen" style="display: none;">
                <h2 id="winner-text"></h2>
                <button onclick="resetGame()">다시하기</button>
            </div>
        </div>

        <div id="mobile-controls">
            <div class="action-btn">
                <button id="shoot-btn">SHOOT</button>
            </div>
        </div>

    </div>
    <script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const selectionScreen = document.getElementById('selection-screen');
const gameScreen = document.getElementById('game-screen');
const gameOverScreen = document.getElementById('game-over-screen');
const winnerText = document.getElementById('winner-text');
const scoreCatEl = document.getElementById('score-cat');
const scoreMonkeyEl = document.getElementById('score-monkey');

let playerTeam = '';
let aiTeam = '';

// Images
const catImg = new Image();
catImg.src = 'sample picture/cat.jpg';
const monkeyImg = new Image();
monkeyImg.src = 'sample picture/monkey.jpg';
const ballImg = new Image();
ballImg.src = 'sample picture/soccor ball.jpg';

// Game State
let isGameRunning = false;
let score = { cat: 0, monkey: 0 };
const WINNING_SCORE = 6;

// Entities
const field = { width: 800, height: 600, goalWidth: 150 };
const cornerRadius = 60;

class Entity {
    constructor(x, y, radius) {
        this.x = x;
        this.y = y;
        this.vx = 0;
        this.vy = 0;
        this.radius = radius;
    }
}

class Player extends Entity {
    constructor(x, y, team, isAI) {
        super(x, y, 25);
        this.team = team;
        this.isAI = isAI;
        this.speed = this.isAI ? 3.5 : 4.5;
        this.img = team === 'cat' ? catImg : monkeyImg;
        this.role = 'atk';
        this.homeX = x;
        this.homeY = y;
    }

    update(keys, ball) {
        if (!this.isAI) {
            this.vx = 0;
            this.vy = 0;
            if (typeof targetTouchX !== 'undefined' && targetTouchX !== null && targetTouchY !== null) {
                const dx = targetTouchX - this.x;
                const dy = targetTouchY - this.y;
                const dist = Math.hypot(dx, dy);
                if (dist > 5) {
                    this.vx = (dx / dist) * this.speed;
                    this.vy = (dy / dist) * this.speed;
                }
            } else {
                if (keys.ArrowUp) this.vy = -this.speed;
                if (keys.ArrowDown) this.vy = this.speed;
                if (keys.ArrowLeft) this.vx = -this.speed;
                if (keys.ArrowRight) this.vx = this.speed;
            }
        } else {
            let targetX = this.homeX;
            let targetY = this.homeY;
            let speedMult = 0.6; 

            const distToBall = Math.hypot(ball.x - this.x, ball.y - this.y);
            const isLeftTeam = this.team === 'cat';
            
            if (ball.owner === this) {
                targetX = isLeftTeam ? field.width : 0;
                targetY = field.height / 2;
                speedMult = 0.8;
            } else {
                if (this.role === 'gk') {
                    targetY = ball.y;
                    targetY = Math.max(field.height/2 - 100, Math.min(field.height/2 + 100, targetY));
                    speedMult = 0.5;
                } else if (this.role === 'def') {
                    const inOurHalf = isLeftTeam ? ball.x < field.width / 2 + 100 : ball.x > field.width / 2 - 100;
                    if (inOurHalf && distToBall < 400) {
                        targetX = ball.x;
                        targetY = ball.y;
                        speedMult = 0.7;
                    } else {
                        targetY = this.homeY + (ball.y - field.height/2) * 0.3;
                    }
                } else if (this.role === 'atk') {
                    targetX = ball.x;
                    targetY = ball.y;
                    speedMult = 0.8;
                }
            }

            const dx = targetX - this.x;
            const dy = targetY - this.y;
            const dist = Math.hypot(dx, dy);
            
            if (dist > 5) {
                this.vx = (dx / dist) * (this.speed * speedMult);
                this.vy = (dy / dist) * (this.speed * speedMult);
            } else {
                this.vx *= 0.5;
                this.vy *= 0.5;
            }
        }

        this.x += this.vx;
        this.y += this.vy;

        this.x = Math.max(this.radius, Math.min(field.width - this.radius, this.x));
        this.y = Math.max(this.radius, Math.min(field.height - this.radius, this.y));
    }

    draw(ctx) {
        ctx.save();
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.clip();
        ctx.drawImage(this.img, this.x - this.radius, this.y - this.radius, this.radius * 2, this.radius * 2);
        ctx.restore();
        
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.lineWidth = this.isAI ? 3 : 5;
        ctx.strokeStyle = this.team === 'cat' ? '#3498db' : '#e74c3c';
        if (!this.isAI) {
            ctx.strokeStyle = '#f1c40f'; // User
        }
        ctx.stroke();
    }
}

class Ball extends Entity {
    constructor(x, y) {
        super(x, y, 15);
        this.friction = 0.98;
        this.owner = null;
        this.cooldown = 0; 
    }

    update() {
        if (this.cooldown > 0) this.cooldown--;

        if (this.owner) {
            let angle = 0;
            if (this.owner.vx !== 0 || this.owner.vy !== 0) {
                angle = Math.atan2(this.owner.vy, this.owner.vx);
            } else {
                angle = this.owner.team === 'cat' ? 0 : Math.PI; 
            }
            
            this.x = this.owner.x + Math.cos(angle) * (this.owner.radius + this.radius);
            this.y = this.owner.y + Math.sin(angle) * (this.owner.radius + this.radius);
            this.vx = 0;
            this.vy = 0;
        } else {
            this.x += this.vx;
            this.y += this.vy;
            this.vx *= this.friction;
            this.vy *= this.friction;
        }

        // 벽 충돌 및 골 판정
        if (this.x - this.radius < 0) {
            if (this.y > field.height/2 - field.goalWidth/2 && this.y < field.height/2 + field.goalWidth/2) {
                return 'monkey';
            } else {
                this.x = this.radius;
                if (!this.owner) this.vx *= -1;
            }
        } else if (this.x + this.radius > field.width) {
            if (this.y > field.height/2 - field.goalWidth/2 && this.y < field.height/2 + field.goalWidth/2) {
                return 'cat';
            } else {
                this.x = field.width - this.radius;
                if (!this.owner) this.vx *= -1;
            }
        }

        if (this.y - this.radius < 0) {
            this.y = this.radius;
            if (!this.owner) this.vy *= -1;
        } else if (this.y + this.radius > field.height) {
            this.y = field.height - this.radius;
            if (!this.owner) this.vy *= -1;
        }
        
        // 둥근 모서리 충돌
        if (!this.owner) {
            const corners = [
                {x: 0, y: 0},
                {x: field.width, y: 0},
                {x: 0, y: field.height},
                {x: field.width, y: field.height}
            ];
            
            for (let c of corners) {
                const dx = this.x - c.x;
                const dy = this.y - c.y;
                const dist = Math.hypot(dx, dy);
                if (dist < cornerRadius + this.radius) {
                    const overlap = (cornerRadius + this.radius) - dist;
                    const angle = Math.atan2(dy, dx);
                    this.x += Math.cos(angle) * overlap;
                    this.y += Math.sin(angle) * overlap;
                    
                    const nx = Math.cos(angle);
                    const ny = Math.sin(angle);
                    const dot = this.vx * nx + this.vy * ny;
                    this.vx -= 2 * dot * nx;
                    this.vy -= 2 * dot * ny;
                }
            }
        }

        return null;
    }

    draw(ctx) {
        ctx.save();
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.clip();
        ctx.drawImage(ballImg, this.x - this.radius, this.y - this.radius, this.radius * 2, this.radius * 2);
        ctx.restore();

        if (this.owner) {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius + 3, 0, Math.PI * 2);
            ctx.lineWidth = 3;
            ctx.strokeStyle = '#f39c12';
            ctx.stroke();
        }
    }
}

let players = [];
let ball;
const keys = {};

// 키보드 이벤트
window.addEventListener('keydown', (e) => {
    if(["Space","ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].indexOf(e.code) > -1) {
        e.preventDefault();
    }
    keys[e.code] = true;
});
window.addEventListener('keyup', (e) => keys[e.code] = false);

// 모바일 터치 이벤트 연결
const bindBtn = (id, code) => {
    const el = document.getElementById(id);
    if (!el) return;
    const press = (e) => { e.preventDefault(); keys[code] = true; el.style.opacity = '0.5'; };
    const release = (e) => { e.preventDefault(); keys[code] = false; el.style.opacity = '1'; };
    
    el.addEventListener('pointerdown', press);
    el.addEventListener('pointerup', release);
    el.addEventListener('pointerleave', release);
};

bindBtn('shoot-btn', 'Space');

canvas.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    targetTouchX = (e.clientX - rect.left) * scaleX;
    targetTouchY = (e.clientY - rect.top) * scaleY;
});
canvas.addEventListener('pointermove', (e) => {
    e.preventDefault();
    if (targetTouchX !== null) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        targetTouchX = (e.clientX - rect.left) * scaleX;
        targetTouchY = (e.clientY - rect.top) * scaleY;
    }
});
canvas.addEventListener('pointerup', (e) => {
    e.preventDefault();
    targetTouchX = null;
    targetTouchY = null;
});
canvas.addEventListener('pointerleave', (e) => {
    e.preventDefault();
    targetTouchX = null;
    targetTouchY = null;
});

function selectCharacter(selectedTeam) {
    playerTeam = selectedTeam;
    aiTeam = selectedTeam === 'cat' ? 'monkey' : 'cat';
    
    selectionScreen.style.display = 'none';
    gameScreen.style.display = 'flex';
    document.getElementById('mobile-controls').style.display = 'flex';
    
    resetGame();
}

function resetGame() {
    score = { cat: 0, monkey: 0 };
    updateScoreUI();
    gameOverScreen.style.display = 'none';
    isGameRunning = true;
    resetPositions();
    gameLoop();
}

function resetPositions() {
    players = [];
    
    const createTeam = (teamName, isLeft) => {
        const sign = isLeft ? 1 : -1;
        const centerX = isLeft ? field.width / 4 : field.width * 3 / 4;
        
        const isUser = (teamName === playerTeam);
        const p = new Player(centerX, field.height / 2, teamName, !isUser);
        p.role = 'atk';
        p.homeX = centerX;
        p.homeY = field.height / 2;
        players.push(p);
    };

    createTeam('cat', true);
    createTeam('monkey', false);
    
    ball = new Ball(field.width / 2, field.height / 2);
}

function updateScoreUI() {
    scoreCatEl.innerText = `고양이: ${score.cat}`;
    scoreMonkeyEl.innerText = `원숭이: ${score.monkey}`;
}

function drawField() {
    ctx.fillStyle = '#4CAF50';
    ctx.fillRect(0, 0, field.width, field.height);

    ctx.strokeStyle = 'white';
    ctx.lineWidth = 3;

    ctx.beginPath();
    ctx.moveTo(field.width / 2, 0);
    ctx.lineTo(field.width / 2, field.height);
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(field.width / 2, field.height / 2, 70, 0, Math.PI * 2);
    ctx.stroke();

    ctx.beginPath(); ctx.arc(0, 0, cornerRadius, 0, Math.PI / 2); ctx.stroke();
    ctx.beginPath(); ctx.arc(field.width, 0, cornerRadius, Math.PI / 2, Math.PI); ctx.stroke();
    ctx.beginPath(); ctx.arc(0, field.height, cornerRadius, -Math.PI / 2, 0); ctx.stroke();
    ctx.beginPath(); ctx.arc(field.width, field.height, cornerRadius, Math.PI, Math.PI * 1.5); ctx.stroke();

    ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
    ctx.fillRect(0, field.height/2 - field.goalWidth/2, 10, field.goalWidth);
    ctx.fillRect(field.width - 10, field.height/2 - field.goalWidth/2, 10, field.goalWidth);
}

function gameLoop() {
    if (!isGameRunning) return;

    for (let p of players) {
        p.update(keys, ball);
    }
    
    // 플레이어 간의 충돌
    for (let i = 0; i < players.length; i++) {
        for (let j = i + 1; j < players.length; j++) {
            const p1 = players[i];
            const p2 = players[j];
            const dx = p2.x - p1.x;
            const dy = p2.y - p1.y;
            const dist = Math.hypot(dx, dy);
            if (dist < p1.radius + p2.radius) {
                const angle = Math.atan2(dy, dx);
                const overlap = p1.radius + p2.radius - dist;
                const pushX = Math.cos(angle) * overlap / 2;
                const pushY = Math.sin(angle) * overlap / 2;
                
                p1.x -= pushX;
                p1.y -= pushY;
                p2.x += pushX;
                p2.y += pushY;
            }
        }
    }

    // 드리블/스틸 및 킥 로직
    if (ball.owner) {
        if (!ball.owner.isAI && keys['Space']) {
            const kickSpeed = 15;
            let angle = (ball.owner.vx !== 0 || ball.owner.vy !== 0) ? Math.atan2(ball.owner.vy, ball.owner.vx) : (ball.owner.team === 'cat' ? 0 : Math.PI);
            ball.vx = Math.cos(angle) * kickSpeed;
            ball.vy = Math.sin(angle) * kickSpeed;
            ball.owner = null;
            ball.cooldown = 20; 
        } else if (ball.owner.isAI) {
            const isLeftTeam = ball.owner.team === 'cat';
            const targetX = isLeftTeam ? field.width : 0;
            const targetY = field.height / 2;
            const distToGoal = Math.hypot(targetX - ball.x, targetY - ball.y);
            
            if (distToGoal < 250 && Math.random() < 0.05) {
                const kickSpeed = 15;
                const angle = Math.atan2(targetY - ball.y, targetX - ball.x);
                ball.vx = Math.cos(angle) * kickSpeed;
                ball.vy = Math.sin(angle) * kickSpeed;
                ball.owner = null;
                ball.cooldown = 20;
            }
        }
    }

    // 공 소유자 판별 및 스틸/반사
    for (let p of players) {
        const dx = ball.x - p.x;
        const dy = ball.y - p.y;
        const dist = Math.hypot(dx, dy);
        
        if (dist < p.radius + ball.radius + 5) {
            const ballSpeed = Math.hypot(ball.vx, ball.vy);
            
            if (!ball.owner) {
                if (ball.cooldown > 0 || ballSpeed > 7) {
                    const dotProduct = ball.vx * dx + ball.vy * dy;
                    if (dotProduct < 0) { 
                        const angle = Math.atan2(dy, dx);
                        const nx = Math.cos(angle);
                        const ny = Math.sin(angle);
                        
                        const overlap = (p.radius + ball.radius + 5) - dist;
                        ball.x += nx * overlap;
                        ball.y += ny * overlap;

                        const dot = ball.vx * nx + ball.vy * ny;
                        ball.vx -= 2 * dot * nx;
                        ball.vy -= 2 * dot * ny;
                        
                        ball.vx *= 0.8;
                        ball.vy *= 0.8;
                        
                        ball.cooldown = 15;
                    }
                } else if (ball.cooldown <= 0) {
                    ball.owner = p;
                }
            } else if (ball.owner && ball.owner.team !== p.team && ball.cooldown <= 0) {
                ball.owner = p;
                ball.cooldown = 30; 
            }
        }
    }

    const goalScored = ball.update();

    if (goalScored) {
        score[goalScored]++;
        updateScoreUI();
        
        if (score[goalScored] >= WINNING_SCORE) {
            isGameRunning = false;
            winnerText.innerText = `${goalScored === 'cat' ? '고양이' : '원숭이'} 승리!`;
            gameOverScreen.style.display = 'block';
        } else {
            resetPositions();
        }
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawField();
    
    let userPlayer = null;
    for (let p of players) {
        if (!p.isAI) {
            userPlayer = p;
        } else {
            p.draw(ctx);
        }
    }
    if (userPlayer) userPlayer.draw(ctx);
    
    ball.draw(ctx);

    if (isGameRunning) {
        requestAnimationFrame(gameLoop);
    }
}
    </script>
</body>
</html>
